name: CI / CD

# ── When this runs ─────────────────────────────────────────────────────────────
# The repo root is the QRD-CSharp folder itself, so QRD.csproj is at the root.
# Push QRD-CSharp/ contents to GitHub — not the parent folder containing it.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

# ─── 1. BUILD & TEST ──────────────────────────────────────────────────────────
jobs:
  test:
    name: Build & Test
    runs-on: windows-latest        # WPF requires Windows
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('QRD.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore packages
        run: dotnet restore QRD.csproj

      - name: Build
        run: dotnet build QRD.csproj -c Release --no-restore

      - name: Run tests
        run: dotnet test QRD.csproj -c Release --no-build --verbosity normal
        continue-on-error: true    # no test project yet — remove this line once you add tests

# ─── 2. TEST GATE ─────────────────────────────────────────────────────────────
  tests-passed:
    name: Tests Passed
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "Build/test step failed — blocking release"
            exit 1
          fi
          echo "Build passed — proceeding"

# ─── 3. BUILD WINDOWS .EXE ────────────────────────────────────────────────────
  build-windows:
    name: Build Windows .exe
    needs: [tests-passed]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('QRD.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore QRD.csproj

      - name: Publish self-contained single-file exe
        shell: pwsh
        run: |
          dotnet publish QRD.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QRD-windows-x64
          path: publish/windows/QRD.exe
          retention-days: 30

      # Only runs when you publish a GitHub Release — attaches QRD.exe to it
      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: publish/windows/QRD.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─── 4. CODE QUALITY (PRs only) ───────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: windows-latest
    needs: [tests-passed]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore QRD.csproj

      - name: Check formatting
        run: dotnet format QRD.csproj --verify-no-changes --verbosity diagnostic
        # To fix locally: run  dotnet format QRD.csproj  then commit
